services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookshelf_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./tudo:/var/www/html
    networks:
      - bookshelf

  nginx:
    image: nginx:alpine
    container_name: bookshelf_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./tudo:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - bookshelf

networks:
  bookshelf:
    driver: bridge
